<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Brick rows -->
  <!-- Row 1 - Red -->
  <g fill="#ef4444">
    <rect x="45" y="30" width="40" height="16" rx="3"/>
    <rect x="95" y="30" width="40" height="16" rx="3"/>
    <rect x="145" y="30" width="40" height="16" rx="3"/>
    <rect x="195" y="30" width="40" height="16" rx="3"/>
    <rect x="245" y="30" width="40" height="16" rx="3"/>
    <rect x="295" y="30" width="40" height="16" rx="3"/>
  </g>
  <!-- Row 2 - Orange -->
  <g fill="#f97316">
    <rect x="45" y="52" width="40" height="16" rx="3"/>
    <rect x="95" y="52" width="40" height="16" rx="3"/>
    <rect x="145" y="52" width="40" height="16" rx="3"/>
    <rect x="195" y="52" width="40" height="16" rx="3"/>
    <rect x="245" y="52" width="40" height="16" rx="3"/>
    <rect x="295" y="52" width="40" height="16" rx="3"/>
  </g>
  <!-- Row 3 - Yellow -->
  <g fill="#eab308">
    <rect x="45" y="74" width="40" height="16" rx="3"/>
    <rect x="95" y="74" width="40" height="16" rx="3"/>
    <rect x="145" y="74" width="40" height="16" rx="3"/>
    <rect x="195" y="74" width="40" height="16" rx="3"/>
    <rect x="245" y="74" width="40" height="16" rx="3"/>
    <rect x="295" y="74" width="40" height="16" rx="3"/>
  </g>
  <!-- Row 4 - Green -->
  <g fill="#22c55e">
    <rect x="45" y="96" width="40" height="16" rx="3"/>
    <rect x="95" y="96" width="40" height="16" rx="3"/>
    <rect x="145" y="96" width="40" height="16" rx="3"/>
    <rect x="195" y="96" width="40" height="16" rx="3"/>
    <rect x="245" y="96" width="40" height="16" rx="3"/>
    <rect x="295" y="96" width="40" height="16" rx="3"/>
  </g>
  <!-- Paddle -->
  <rect x="160" y="155" width="60" height="10" rx="5" fill="#3b82f6"/>
  <!-- Ball -->
  <circle cx="190" cy="135" r="6" fill="#fff"/>
  <circle cx="188" cy="133" r="2" fill="#94a3b8" opacity="0.5"/>
  <text x="200" y="190" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">BREAKOUT</text>
</svg>
