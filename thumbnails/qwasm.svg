<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Gothic Quake style corridor -->
  <rect x="120" y="40" width="160" height="120" fill="#1e293b" rx="2" opacity="0.4"/>
  <rect x="60" y="50" width="35" height="100" fill="#292524" rx="2" opacity="0.6"/>
  <rect x="305" y="50" width="35" height="100" fill="#292524" rx="2" opacity="0.6"/>
  <rect x="60" y="50" width="35" height="8" fill="#44403c" rx="1" opacity="0.5"/>
  <rect x="305" y="50" width="35" height="8" fill="#44403c" rx="1" opacity="0.5"/>
  <!-- Floor -->
  <rect x="120" y="120" width="160" height="40" fill="#292524" opacity="0.4"/>
  <!-- Pentagram -->
  <g transform="translate(200, 80)" opacity="0.3">
    <polygon points="0,-15 4,-5 15,-5 6,2 9,13 0,7 -9,13 -6,2 -15,-5 -4,-5" fill="#a855f7" stroke="#a855f7" stroke-width="0.5"/>
  </g>
  <!-- Shambler enemy -->
  <g transform="translate(200, 50)">
    <rect x="-10" y="-12" width="20" height="24" fill="#7c3aed" rx="5" opacity="0.7"/>
    <circle cx="-4" cy="-6" r="2.5" fill="#fca5a5" opacity="0.9"/>
    <circle cx="4" cy="-6" r="2.5" fill="#fca5a5" opacity="0.9"/>
    <rect x="-4" y="2" width="8" height="2" fill="#fca5a5" opacity="0.5"/>
  </g>
  <!-- Nailgun -->
  <g transform="translate(140, 140)">
    <rect x="0" y="0" width="20" height="6" fill="#78716c" rx="2" opacity="0.7"/>
    <rect x="18" y="1" width="8" height="4" fill="#57534e" rx="1" opacity="0.7"/>
  </g>
  <!-- Health icon -->
  <rect x="40" y="155" width="30" height="10" fill="#dc2626" rx="2" opacity="0.5"/>
  <rect x="40" y="155" width="20" height="10" fill="#dc2626" rx="2" opacity="0.8"/>
  <text x="200" y="185" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">QWASM - QUAKE</text>
</svg>