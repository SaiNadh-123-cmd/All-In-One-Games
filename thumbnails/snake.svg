<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="100" y1="30" x2="100" y2="170"/>
    <line x1="140" y1="30" x2="140" y2="170"/>
    <line x1="180" y1="30" x2="180" y2="170"/>
    <line x1="220" y1="30" x2="220" y2="170"/>
    <line x1="260" y1="30" x2="260" y2="170"/>
    <line x1="300" y1="30" x2="300" y2="170"/>
    <line x1="80" y1="60" x2="320" y2="60"/>
    <line x1="80" y1="90" x2="320" y2="90"/>
    <line x1="80" y1="120" x2="320" y2="120"/>
    <line x1="80" y1="150" x2="320" y2="150"/>
  </g>
  <!-- Snake body -->
  <g fill="#22c55e">
    <rect x="182" y="92" width="16" height="16" rx="3"/>
    <rect x="202" y="92" width="16" height="16" rx="3"/>
    <rect x="222" y="92" width="16" height="16" rx="3"/>
    <rect x="242" y="92" width="16" height="16" rx="3"/>
    <rect x="262" y="92" width="16" height="16" rx="3"/>
    <rect x="282" y="92" width="16" height="16" rx="3"/>
  </g>
  <!-- Snake head -->
  <rect x="162" y="92" width="16" height="16" rx="4" fill="#16a34a"/>
  <circle cx="168" cy="98" r="2" fill="#fff"/>
  <circle cx="172" cy="98" r="2" fill="#fff"/>
  <!-- Tongue -->
  <line x1="162" y1="100" x2="152" y2="98" stroke="#ef4444" stroke-width="2"/>
  <line x1="162" y1="100" x2="152" y2="102" stroke="#ef4444" stroke-width="2"/>
  <!-- Food -->
  <rect x="122" y="132" width="12" height="12" rx="6" fill="#ef4444"/>
  <!-- Text -->
  <text x="200" y="190" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">SNAKE</text>
</svg>
