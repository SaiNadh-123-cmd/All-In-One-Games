<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Tetris pieces -->
  <!-- I piece -->
  <g fill="#06b6d4">
    <rect x="120" y="40" width="18" height="18" rx="2"/>
    <rect x="140" y="40" width="18" height="18" rx="2"/>
    <rect x="160" y="40" width="18" height="18" rx="2"/>
    <rect x="180" y="40" width="18" height="18" rx="2"/>
  </g>
  <!-- T piece -->
  <g fill="#a855f7">
    <rect x="200" y="60" width="18" height="18" rx="2"/>
    <rect x="218" y="60" width="18" height="18" rx="2"/>
    <rect x="236" y="60" width="18" height="18" rx="2"/>
    <rect x="218" y="42" width="18" height="18" rx="2"/>
  </g>
  <!-- L piece -->
  <g fill="#f97316">
    <rect x="100" y="80" width="18" height="18" rx="2"/>
    <rect x="100" y="100" width="18" height="18" rx="2"/>
    <rect x="100" y="120" width="18" height="18" rx="2"/>
    <rect x="118" y="120" width="18" height="18" rx="2"/>
  </g>
  <!-- O piece -->
  <g fill="#eab308">
    <rect x="180" y="90" width="18" height="18" rx="2"/>
    <rect x="198" y="90" width="18" height="18" rx="2"/>
    <rect x="180" y="108" width="18" height="18" rx="2"/>
    <rect x="198" y="108" width="18" height="18" rx="2"/>
  </g>
  <!-- S piece -->
  <g fill="#22c55e">
    <rect x="230" y="100" width="18" height="18" rx="2"/>
    <rect x="248" y="100" width="18" height="18" rx="2"/>
    <rect x="248" y="82" width="18" height="18" rx="2"/>
    <rect x="266" y="82" width="18" height="18" rx="2"/>
  </g>
  <!-- Z piece -->
  <g fill="#ef4444">
    <rect x="140" y="140" width="18" height="18" rx="2"/>
    <rect x="158" y="140" width="18" height="18" rx="2"/>
    <rect x="158" y="122" width="18" height="18" rx="2"/>
    <rect x="176" y="122" width="18" height="18" rx="2"/>
  </g>
  <!-- J piece -->
  <g fill="#3b82f6">
    <rect x="210" y="130" width="18" height="18" rx="2"/>
    <rect x="210" y="148" width="18" height="18" rx="2"/>
    <rect x="228" y="148" width="18" height="18" rx="2"/>
    <rect x="246" y="148" width="18" height="18" rx="2"/>
  </g>
  <text x="200" y="190" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">TETRIS</text>
</svg>
