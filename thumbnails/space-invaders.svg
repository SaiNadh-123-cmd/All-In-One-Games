<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="120" cy="50" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="300" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="350" cy="60" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="80" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="250" cy="40" r="1" fill="#fff" opacity="0.6"/>
  <!-- Alien row -->
  <g fill="#22c55e" opacity="0.9">
    <rect x="100" y="60" width="24" height="20" rx="4"/>
    <rect x="140" y="60" width="24" height="20" rx="4"/>
    <rect x="180" y="60" width="24" height="20" rx="4"/>
    <rect x="220" y="60" width="24" height="20" rx="4"/>
    <rect x="260" y="60" width="24" height="20" rx="4"/>
  </g>
  <g fill="#eab308" opacity="0.9">
    <rect x="110" y="90" width="24" height="20" rx="4"/>
    <rect x="150" y="90" width="24" height="20" rx="4"/>
    <rect x="190" y="90" width="24" height="20" rx="4"/>
    <rect x="230" y="90" width="24" height="20" rx="4"/>
    <rect x="270" y="90" width="24" height="20" rx="4"/>
  </g>
  <g fill="#ef4444" opacity="0.9">
    <rect x="120" y="120" width="24" height="20" rx="4"/>
    <rect x="160" y="120" width="24" height="20" rx="4"/>
    <rect x="200" y="120" width="24" height="20" rx="4"/>
    <rect x="240" y="120" width="24" height="20" rx="4"/>
  </g>
  <!-- Player ship -->
  <polygon points="195,165 205,165 210,155 190,155" fill="#3b82f6"/>
  <rect x="193" y="155" width="14" height="10" rx="3" fill="#3b82f6"/>
  <!-- Laser -->
  <rect x="199" y="140" width="2" height="12" fill="#60a5fa" opacity="0.8"/>
  <!-- Text -->
  <text x="200" y="190" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">SPACE INVADERS</text>
</svg>
