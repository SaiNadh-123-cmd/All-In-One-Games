<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Score HUD -->
  <rect x="10" y="10" width="80" height="24" fill="#1e293b" rx="4" opacity="0.8"/>
  <text x="14" y="26" fill="#ef4444" font-family="monospace" font-size="10" font-weight="bold">HP 100</text>
  <rect x="310" y="10" width="80" height="24" fill="#1e293b" rx="4" opacity="0.8"/>
  <text x="314" y="26" fill="#22c55e" font-family="monospace" font-size="10" font-weight="bold">AMMO 30</text>
  <!-- Weapon bar -->
  <rect x="140" y="170" width="120" height="20" fill="#1e293b" rx="4" opacity="0.8"/>
  <rect x="145" y="174" width="16" height="12" fill="#f59e0b" rx="2" opacity="0.6"/>
  <rect x="165" y="174" width="16" height="12" fill="#3b82f6" rx="2" opacity="0.9"/>
  <rect x="185" y="174" width="16" height="12" fill="#3b82f6" rx="2" opacity="0.6"/>
  <rect x="205" y="174" width="16" height="12" fill="#64748b" rx="2" opacity="0.4"/>
  <rect x="225" y="174" width="16" height="12" fill="#64748b" rx="2" opacity="0.4"/>
  <!-- Map elements -->
  <rect x="50" y="50" width="40" height="40" fill="#334155" rx="4" opacity="0.3"/>
  <rect x="310" y="80" width="30" height="60" fill="#334155" rx="4" opacity="0.3"/>
  <rect x="170" y="90" width="60" height="20" fill="#475569" rx="3" opacity="0.4"/>
  <!-- Enemy indicator -->
  <polygon points="340,140 348,128 356,140" fill="#ef4444" opacity="0.7"/>
  <polygon points="60,140 68,128 76,140" fill="#ef4444" opacity="0.5"/>
  <text x="200" y="185" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">FPS2 MULTIPLAYER</text>
</svg>