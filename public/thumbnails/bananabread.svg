<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Crosshair -->
  <circle cx="200" cy="100" r="20" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="100" r="3" fill="#22d3ee" opacity="0.8"/>
  <line x1="180" y1="100" x2="160" y2="100" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="100" x2="240" y2="100" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="80" x2="200" y2="60" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="120" x2="200" y2="140" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <!-- Arena pillars -->
  <rect x="60" y="60" width="20" height="120" fill="#334155" rx="3" opacity="0.5"/>
  <rect x="320" y="60" width="20" height="120" fill="#334155" rx="3" opacity="0.5"/>
  <rect x="140" y="40" width="120" height="8" fill="#22d3ee" opacity="0.2" rx="2"/>
  <rect x="140" y="152" width="120" height="8" fill="#22d3ee" opacity="0.2" rx="2"/>
  <!-- Bots -->
  <g transform="translate(80, 90)">
    <rect x="-8" y="-10" width="16" height="20" fill="#ef4444" rx="4" opacity="0.7"/>
    <rect x="-6" y="-12" width="12" height="4" fill="#ef4444" rx="2" opacity="0.7"/>
  </g>
  <g transform="translate(320, 110) scale(-1,1)">
    <rect x="-8" y="-10" width="16" height="20" fill="#f59e0b" rx="4" opacity="0.7"/>
    <rect x="-6" y="-12" width="12" height="4" fill="#f59e0b" rx="2" opacity="0.7"/>
  </g>
  <text x="200" y="185" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">BANANABREAD FPS</text>
</svg>