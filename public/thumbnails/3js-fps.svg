<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0f172a"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- 3D wireframe scene -->
  <g opacity="0.3" stroke="#60a5fa" stroke-width="1" fill="none">
    <polygon points="50,140 200,30 350,140"/>
    <polygon points="50,140 200,120 350,140"/>
    <line x1="200" y1="30" x2="200" y2="120"/>
  </g>
  <!-- 3D cubes -->
  <g transform="translate(100, 80)" opacity="0.5">
    <polygon points="0,0 20,-10 40,0 20,10" fill="none" stroke="#60a5fa" stroke-width="1"/>
    <polygon points="0,0 20,10 20,30 0,20" fill="none" stroke="#60a5fa" stroke-width="1"/>
    <polygon points="40,0 20,10 20,30 40,20" fill="none" stroke="#60a5fa" stroke-width="1"/>
  </g>
  <g transform="translate(250, 70)" opacity="0.5">
    <polygon points="0,0 15,-8 30,0 15,8" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <polygon points="0,0 15,8 15,24 0,16" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <polygon points="30,0 15,8 15,24 30,16" fill="none" stroke="#38bdf8" stroke-width="1"/>
  </g>
  <!-- Crosshair -->
  <circle cx="200" cy="90" r="12" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="90" r="2" fill="#ef4444" opacity="0.8"/>
  <line x1="186" y1="90" x2="192" y2="90" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="208" y1="90" x2="214" y2="90" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="76" x2="200" y2="82" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="98" x2="200" y2="104" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <!-- Three.js text -->
  <text x="200" y="180" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9" opacity="0.6">THREE.JS</text>
  <text x="200" y="192" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" opacity="0.7">3JS FPS</text>
</svg>