<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Duck Hunt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;cursor:crosshair}
#wrap{text-align:center}
canvas{display:block;margin:0 auto;border:2px solid #334155;border-radius:8px;background:#87ceeb;max-width:95vw;max-height:80vh}
#hud{display:flex;justify-content:space-between;padding:8px 4px;color:#94a3b8;font-size:14px;max-width:600px;margin:0 auto}
#hud span{font-weight:700}.score{color:#eab308}.round{color:#3b82f6}.ammo{color:#ef4444}
#overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center;flex-direction:column;gap:16px;cursor:default}
#overlay.show{display:flex}
#overlay h2{color:#f1f5f9;font-size:24px}
#overlay p{color:#94a3b8;font-size:14px}
#overlay button{padding:12px 32px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="wrap">
<div id="hud"><span class="score">Score: <span id="score">0</span></span><span class="round">Round: <span id="round">1</span></span><span class="ammo">Ammo: <span id="ammo">3</span></span><span>Best: <span id="best">0</span></span></div>
<div style="position:relative">
<canvas id="gc" width="600" height="400"></canvas>
<div id="overlay"><h2 id="ol-title">Duck Hunt</h2><p id="ol-msg">Shoot the ducks!</p><button id="ol-btn">Play</button></div>
</div>
</div>
<script>
const c=document.getElementById('gc'),ctx=c.getContext('2d');
const scoreEl=document.getElementById('score'),roundEl=document.getElementById('round'),ammoEl=document.getElementById('ammo'),bestEl=document.getElementById('best');
const overlay=document.getElementById('overlay'),olTitle=document.getElementById('ol-title'),olMsg=document.getElementById('ol-msg'),olBtn=document.getElementById('ol-btn');
let best=parseInt(localStorage.getItem('duckhunt_best')||'0');bestEl.textContent=best;
let ducks=[],score=0,round=1,ammo=3,gameOverFlag=false,loop,roundActive=false;
const DUCK_W=48,DUCK_H=48;
function createDuck(){
  const fromLeft=Math.random()>0.5;
  return{
    x:fromLeft?-DUCK_W:600+DUCK_W,y:200+Math.random()*150,
    dx:(Math.random()*2+1)*(fromLeft?1:-1),dy:(Math.random()-0.5)*1.5,
    w:DUCK_W,h:DUCK_H,alive:true,frames:0,wing:0
  };
}
function initRound(){
  const numDucks=Math.min(round+2,8);
  ducks=[];for(let i=0;i<numDucks;i++)ducks.push(createDuck());
  ammo=Math.max(3,Math.floor(numDucks*1.5));gameOverFlag=false;roundActive=true;
  ammoEl.textContent=ammo;
}
function drawDuck(d){
  const cx=d.x+d.w/2,cy=d.y+d.h/2;
  ctx.save();ctx.translate(cx,cy);
  if(d.dx<0)ctx.scale(-1,1);
  // Body
  ctx.fillStyle='#16a34a';ctx.beginPath();ctx.ellipse(0,4,18,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#15803d';ctx.beginPath();ctx.ellipse(2,2,14,10,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(16,-6,8,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(19,-8,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(18.5,-9,1,0,Math.PI*2);ctx.fill();
  // Beak
  ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(24,-6);ctx.lineTo(30,-4);ctx.lineTo(24,-2);ctx.closePath();ctx.fill();
  // Wing
  ctx.fillStyle='#15803d';
  const wa=Math.sin(d.frames*0.3)*0.4;
  ctx.save();ctx.translate(-2,0);ctx.rotate(wa);
  ctx.beginPath();ctx.ellipse(0,0,14,7,0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.restore();
}
function update(){
  if(!roundActive||gameOverFlag)return;
  ducks.forEach(d=>{
    d.x+=d.dx;d.y+=d.dy;d.frames++;
    if(d.y<30||d.y>350)d.dy=-d.dy;
  });
  let alive=ducks.filter(d=>d.alive).length;
  if(alive===0&&ducks.length>0){roundActive=false;clearInterval(loop);nextRound();}
}
function draw(){
  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,400);
  grad.addColorStop(0,'#87ceeb');grad.addColorStop(0.6,'#b0e0e6');grad.addColorStop(1,'#90ee90');
  ctx.fillStyle=grad;ctx.fillRect(0,0,600,400);
  // Grass
  ctx.fillStyle='#22c55e';ctx.beginPath();ctx.rect(0,350,600,50);ctx.fill();
  ctx.fillStyle='#16a34a';for(let i=0;i<30;i++){const x=i*20+Math.sin(i)*5;ctx.beginPath();ctx.moveTo(x,350);ctx.lineTo(x-4,365);ctx.lineTo(x+4,365);ctx.closePath();ctx.fill();}
  // Ducks
  ducks.forEach(d=>{if(d.alive)drawDuck(d);});
}
function shoot(x,y){
  if(!roundActive||gameOverFlag)return;
  ammo--;ammoEl.textContent=ammo;
  let hit=false;
  ducks.forEach(d=>{
    if(!d.alive)return;
    if(x>=d.x&&x<=d.x+d.w&&y>=d.y&&y<=d.y+d.h){
      d.alive=false;hit=true;score+=10*round;
      scoreEl.textContent=score;
      // Death animation - just shake
      for(let i=0;i<5;i++)setTimeout(()=>{d.y+=i%2?-3:3;draw();},i*50);
    }
  });
  if(!hit){/* miss */}
  if(ammo<=0){roundActive=false;clearInterval(loop);gameOver();}
}
function nextRound(){
  if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('duckhunt_best',best.toString());}
  round++;roundEl.textContent=round;
  setTimeout(()=>{initRound();loop=setInterval(()=>{update();draw();},1000/60);},1000);
}
function gameOver(){
  gameOverFlag=true;
  if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('duckhunt_best',best.toString());}
  overlay.classList.add('show');olTitle.textContent='Game Over';olMsg.textContent=`Score: ${score} (Round ${round})`;olBtn.textContent='Restart';
}
function startGame(){
  overlay.classList.remove('show');score=0;round=1;
  scoreEl.textContent='0';roundEl.textContent='1';
  initRound();clearInterval(loop);loop=setInterval(()=>{update();draw();},1000/60);
}
c.addEventListener('click',e=>{if(!roundActive||gameOverFlag)return;const r=c.getBoundingClientRect();shoot(e.clientX-r.left,e.clientY-r.top);});
c.addEventListener('touchstart',e=>{if(!roundActive||gameOverFlag)return;e.preventDefault();const r=c.getBoundingClientRect(),t=e.touches[0];shoot(t.clientX-r.left,t.clientY-r.top);},{passive:false});
olBtn.addEventListener('click',startGame);
initRound();overlay.classList.add('show');olTitle.textContent='Duck Hunt';olMsg.textContent='Tap or click to shoot the ducks!';olBtn.textContent='Play';
</script>
</body>
</html>
